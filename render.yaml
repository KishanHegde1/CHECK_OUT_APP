services:
  - type: web
    name: hostel-checkout-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Hostel Checkout API
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: "10"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
