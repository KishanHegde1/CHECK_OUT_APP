[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_path_separator = os
output_encoding = utf-8

# DATABASE_URL is intentionally not stored here. migrations/env.py obtains the
# validated URL from app.core.config.Settings and passes a SQLAlchemy URL object
# directly to Alembic, avoiding ConfigParser interpolation and credential logs.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
